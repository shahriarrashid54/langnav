# PPO Training Configuration

# Environment
env:
  max_episode_steps: 500
  n_obstacles: 4

# PPO Hyperparameters
policy: "MlpPolicy"
learning_rate: 3.0e-4
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.01

# Parallelism
n_envs: 4

# Training budget
total_timesteps: 1_000_000

# Run name
run_name: "langnav_ppo_v1"
