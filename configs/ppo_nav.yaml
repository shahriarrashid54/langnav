# PPO Training Configuration

# Environment
env:
  max_episode_steps: 500
  render_mode: null

# PPO Hyperparameters
policy: "MlpPolicy"
learning_rate: 3e-4
n_steps: 2048
batch_size: 64
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.01

# Training
run_name: "langnav_ppo_v1"
total_timesteps: 1_000_000
checkpoint_freq: 10000

# Logging
log_dir: "logs"
use_wandb: false
