# W&B hyperparameter sweep configuration
# Launch with: wandb sweep configs/wandb_sweep.yaml
# Then:        wandb agent <sweep_id>

program: scripts/train_model.py
method: bayes
metric:
  name: eval/mean_reward
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3
  batch_size:
    values: [64, 128, 256]
  n_steps:
    values: [1024, 2048, 4096]
  gamma:
    values: [0.95, 0.99, 0.995]
  gae_lambda:
    values: [0.9, 0.95, 0.98]
  clip_range:
    values: [0.1, 0.2, 0.3]
  entropy_coef:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 5.0e-2
  n_obstacles:
    values: [2, 4, 6]

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2
